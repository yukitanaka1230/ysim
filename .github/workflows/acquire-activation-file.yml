name: Acquire Unity activation file (.alf)

# Run this ONE-TIME workflow to generate a Unity activation file (.alf)
# that you can use to get a .ulf license file for the UNITY_LICENSE secret.
#
# Steps:
#   1. Run this workflow (Actions tab → Acquire Unity activation file → Run workflow)
#   2. Download the "Unity_v6000.4.0f1.alf" artifact
#   3. Upload the .alf file to https://license.unity3d.com/manual
#   4. Pick "Unity Personal Edition" → Download the resulting .ulf file
#   5. Open the .ulf file in a text editor, copy ENTIRE contents
#   6. Paste into GitHub secret UNITY_LICENSE
#
# After this, you can disable or delete this workflow.
on:
  workflow_dispatch:

jobs:
  request-activation-file:
    name: Request Unity activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        uses: game-ci/unity-request-activation-file@v2
        id: get-activation-file
        with:
          unityVersion: 6000.4.0f1

      - name: Expose as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get-activation-file.outputs.filePath }}
          path: ${{ steps.get-activation-file.outputs.filePath }}
